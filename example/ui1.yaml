# Minimal rbAmp UI1 example — one voltage + one current channel.
#
# Adjust `esp32` board, WiFi credentials, and GPIO pins to match your hardware.
# Then build with:
#
#   esphome compile ui1.yaml
#
# (or use the ESPHome Add-on inside Home Assistant.)

esphome:
  name: rbamp-ui1

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

# Networking + HA integration — uncomment and fill in for your bench.
#
# wifi:
#   ssid: "YOUR_SSID"
#   password: "YOUR_PASSWORD"
#   ap:                          # optional AP fallback if STA fails
#     ssid: "rbAmp UI1 Fallback"
#     password: "rbamprbamp"
#
# captive_portal:                # works with the AP fallback above
# api:                           # Home Assistant native API on port 6053
# ota:
#   - platform: esphome
#
# web_server:                    # optional local HTTP UI on port 80
#   port: 80
#   version: 3

# I²C pin choice depends on ESP32 variant:
#   classic ESP32 (this file, board: esp32dev) — GPIO21/22 default
#   ESP32-S3 — GPIO21/22 are USB-JTAG on USB-equipped boards; use GPIO8 (SDA) / GPIO9 (SCL)
#   ESP32-C3 — use GPIO4 (SDA) / GPIO5 (SCL)
#   ESP32-S2 — GPIO21/22 usually fine; verify against your board's pinout
# When changing variant, also update `esp32: variant:` + `board:` above.
i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 50kHz    # 100 kHz triggers intermittent NACKs from the device; 50 kHz cuts them ~5-10×
  scan: true

external_components:
  - source:
      type: local
      path: ../components
    components: [rbamp]

rbamp:
  id: meter1
  address: 0x50
  update_interval: 60s

sensor:
  - platform: rbamp
    rbamp_id: meter1
    voltage:
      name: "Mains Voltage"
    current:
      name: "Mains Current"
    power:
      name: "Mains Power"
    energy:
      name: "Mains Energy"
    frequency:
      name: "Mains Frequency"
    power_factor:
      name: "Mains Power Factor"
